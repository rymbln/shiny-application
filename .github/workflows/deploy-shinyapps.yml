name: Deploy to ShinyApps.io

on:
  push:
    branches: [ main, master ]
    paths:
      - 'app.R'
      - 'ui.R'
      - 'server.R'
      - 'DESCRIPTION'
      - 'renv.lock'
      - 'R/'
      - 'www/'
      - '.github/workflows/deploy-shinyapps.yml'
  workflow_dispatch: # Позволяет запускать вручную

# Отменяет предыдущие запуски при новом пуше
concurrency:
  group: shiny-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    env:
      R_REMOTES_NO_ERRORS_FROM_WARNINGS: true
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.5.2'
          use-public-rspm: true
          Ncpus: 2

      - name: 📦 Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            libfontconfig1-dev \
            libharfbuzz-dev \
            libfribidi-dev \
            libfreetype6-dev \
            libpng-dev \
            libtiff5-dev \
            libjpeg-dev

      # ✅ ИСПРАВЛЕНО: используем hashFiles() вместо file.exists()
      - name: 📚 Install R package dependencies (fallback without renv)
        if: ${{ hashFiles('renv.lock') == '' }}
        run: |
          install.packages("remotes")
          remotes::install_deps(dependencies = TRUE)
        shell: Rscript {0}

      - name: 📦 Restore renv cache (if renv.lock exists)
        if: ${{ hashFiles('renv.lock') != '' }}
        uses: r-lib/actions/setup-renv@v2
        with:
          cache-version: 1

      - name: 🔐 Configure rsconnect
        run: |
          install.packages("rsconnect")
          library(rsconnect)
          setAccountInfo(
            name = "${{ vars.SHINYAPPS_ACCOUNT }}",
            token = "${{ secrets.SHINYAPPS_TOKEN }}",
            secret = "${{ secrets.SHINYAPPS_SECRET }}"
          )
          saveConfig()
        shell: Rscript {0}
        env:
          SHINYAPPS_ACCOUNT: ${{ vars.SHINYAPPS_ACCOUNT || 'your-account-name' }}

      - name: 🚀 Deploy to shinyapps.io
        run: |
          library(rsconnect)
          app_name <- "${{ vars.SHINYAPPS_APP_NAME || 'my-shiny-app' }}"
          app_dir <- getwd()
          cat("🚀 Начинаю деплой приложения:", app_name, "\n")
          deployApp(
            appName = app_name,
            appDir = app_dir,
            account = "${{ vars.SHINYAPPS_ACCOUNT || 'your-account-name' }}",
            forceUpdate = TRUE,
            lint = FALSE,
            logLevel = "verbose",
            launch.browser = FALSE
          )
          cat("✅ Деплой завершён!\n")
          cat("🔗 Приложение доступно: https://", 
              "${{ vars.SHINYAPPS_ACCOUNT || 'your-account-name' }}", 
              ".shinyapps.io/", app_name, "\n", sep = "")
        shell: Rscript {0}

      - name: 📝 Upload deployment logs (при ошибке)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: shiny-deploy-logs
          path: |
            rsconnect/
            *.log
          retention-days: 7